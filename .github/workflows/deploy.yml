name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:      # allows manual trigger from GitHub Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; cancel older queued runs
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── 1. Build ──────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          REPO_BASEPATH: /${{ github.event.repository.name }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out/    # next build with output:'export' writes to /out

  # ── 2. Deploy ─────────────────────────────────────────────
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
